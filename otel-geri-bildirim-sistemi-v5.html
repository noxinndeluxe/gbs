<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Otel Yönetim Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // ==================== SUPABASE CONFIG ====================
        const SUPABASE_URL = '%%SUPABASE_URL%%';
        const SUPABASE_ANON_KEY = '%%SUPABASE_ANON_KEY%%';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==================== SESSION MANAGEMENT ====================
        const SESSION_KEY = 'hotel_user_session';
        
        const saveSession = (user) => {
            sessionStorage.setItem(SESSION_KEY, JSON.stringify(user));
        };
        
        const loadSession = () => {
            const session = sessionStorage.getItem(SESSION_KEY);
            return session ? JSON.parse(session) : null;
        };
        
        const clearSession = () => {
            sessionStorage.removeItem(SESSION_KEY);
        };

        // ==================== CONSTANTS ====================
        const DEPARTMENTS = [
            'Yemek ve İçecek', 'Temizlik', 'Ön Büro', 'Misafir İlişkileri',
            'Güvenlik ve Cankurtaran', 'Teknik Servis', 'Animasyon ve Eğlence', 'Diğer'
        ];

        const AMENITY_TYPES = [
            'Meyve Sepeti', 'Çikolata', 'Şampanya', 'Çiçek', 
            'Pasta', 'Welcome Drink', 'Özel İkram', 'Diğer'
        ];

        // ==================== UTILITIES ====================
        const isOverdue = (feedback) => {
            if (feedback.type !== 'complaint' || feedback.status !== 'open') return false;
            const days = Math.ceil((new Date() - new Date(feedback.date)) / (1000 * 60 * 60 * 24));
            return days > 1;
        };

        const getOverdueDays = (feedback) => {
            return Math.ceil((new Date() - new Date(feedback.date)) / (1000 * 60 * 60 * 24));
        };

        const formatDate = (dateString) => {
            return new Date(dateString).toLocaleDateString('tr-TR', { 
                day: 'numeric', month: 'long', year: 'numeric' 
            });
        };

        const formatDateTime = (dateString) => {
            return new Date(dateString).toLocaleDateString('tr-TR', { 
                day: 'numeric', month: 'long', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        };

        // ==================== EXPORT FUNCTIONS ====================
        const exportToExcel = (feedbacks) => {
            const data = feedbacks.map(fb => ({
                'Tarih': fb.date,
                'Tip': fb.type === 'complaint' ? 'Şikayet' : 'Olumlu',
                'Departman': fb.department,
                'Başlık': fb.title,
                'Açıklama': fb.description,
                'Çözüm': fb.resolution || '-',
                'Misafir': fb.guest_name,
                'Oda': fb.room_number,
                'Durum': fb.status === 'open' ? 'Açık' : 'Kapalı',
                'Kaydeden': fb.created_by
            }));

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Geri Bildirimler");
            XLSX.writeFile(wb, `geri-bildirimler-${new Date().toISOString().split('T')[0]}.xlsx`);
        };

        const exportAmenitiesExcel = (amenities) => {
            const data = amenities.map(am => ({
                'Tarih': formatDateTime(am.created_at),
                'Oda': am.room_number,
                'İkram': am.amenity_type,
                'Sebep': am.reason,
                'Not': am.notes || '-',
                'Gönderen': am.created_by
            }));

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Oda İkramları");
            XLSX.writeFile(wb, `oda-ikramlari-${new Date().toISOString().split('T')[0]}.xlsx`);
        };

        // ==================== CHART COMPONENT ====================
        function ChartComponent({ type, data }) {
            const chartRef = useRef(null);
            const chartInstanceRef = useRef(null);

            useEffect(() => {
                if (!chartRef.current) return;
                if (chartInstanceRef.current) chartInstanceRef.current.destroy();

                const ctx = chartRef.current.getContext('2d');

                if (type === 'bar') {
                    chartInstanceRef.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: data.map(d => d.name),
                            datasets: [
                                { label: 'Şikayet', data: data.map(d => d.complaints), backgroundColor: '#ef4444' },
                                { label: 'Olumlu', data: data.map(d => d.positive), backgroundColor: '#22c55e' }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'top' } },
                            scales: { y: { beginAtZero: true } }
                        }
                    });
                } else if (type === 'pie') {
                    chartInstanceRef.current = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: data.map(d => d.name),
                            datasets: [{ data: data.map(d => d.value), backgroundColor: data.map(d => d.color) }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'bottom' } }
                        }
                    });
                } else if (type === 'line') {
                    chartInstanceRef.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.map(d => d.date),
                            datasets: [{
                                label: 'Toplam',
                                data: data.map(d => d.count),
                                borderColor: '#14285a',
                                backgroundColor: 'rgba(20, 40, 100, 0.1)',
                                tension: 0.4,
                                fill: true
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: { y: { beginAtZero: true } }
                        }
                    });
                }

                return () => {
                    if (chartInstanceRef.current) chartInstanceRef.current.destroy();
                };
            }, [type, data]);

            return <canvas ref={chartRef}></canvas>;
        }

        // ==================== MAIN APP ====================
        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [users, setUsers] = useState([]);
            const [feedbacks, setFeedbacks] = useState([]);
            const [amenities, setAmenities] = useState([]);
            const [restaurants, setRestaurants] = useState([]);
            const [reservations, setReservations] = useState([]);
            const [currentView, setCurrentView] = useState('dashboard');
            const [filters, setFilters] = useState({
                department: 'all', type: 'all', dateFrom: '', dateTo: '', status: 'all', search: ''
            });
            const [sortBy, setSortBy] = useState('date');
            const [sortOrder, setSortOrder] = useState('desc');
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState('');
            const [editingItem, setEditingItem] = useState(null);

            // Session yönetimi
            useEffect(() => {
                const savedSession = loadSession();
                if (savedSession) setCurrentUser(savedSession);
            }, []);

            useEffect(() => {
                if (currentUser) saveSession(currentUser);
            }, [currentUser]);

            // Verileri yükle
            const loadData = async () => {
                try {
                    const { data: usersData } = await supabase.from('users').select('*').order('id');
                    const { data: feedbacksData } = await supabase.from('feedbacks').select('*').order('created_at', { ascending: false });
                    const { data: amenitiesData } = await supabase.from('amenities').select('*').order('created_at', { ascending: false });
                    const { data: restaurantsData } = await supabase.from('restaurants').select('*').order('name');
                    const { data: reservationsData } = await supabase.from('reservations').select('*, restaurants(name)').order('reservation_date', { ascending: false });
                    
                    setUsers(usersData || []);
                    setFeedbacks(feedbacksData || []);
                    setAmenities(amenitiesData || []);
                    setRestaurants(restaurantsData || []);
                    setReservations(reservationsData || []);
                } catch (error) {
                    console.error('Yükleme hatası:', error);
                }
            };

            useEffect(() => {
                if (currentUser) loadData();
            }, [currentUser]);

            // ==================== REALTIME ====================
            useEffect(() => {
                if (!currentUser) return;
                const channel = supabase
                    .channel('realtime-all')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'feedbacks' }, (payload) => {
                        if (payload.eventType === 'INSERT') setFeedbacks(prev => [payload.new, ...prev]);
                        else if (payload.eventType === 'UPDATE') setFeedbacks(prev => prev.map(f => f.id === payload.new.id ? payload.new : f));
                        else if (payload.eventType === 'DELETE') setFeedbacks(prev => prev.filter(f => f.id !== payload.old.id));
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'amenities' }, (payload) => {
                        if (payload.eventType === 'INSERT') setAmenities(prev => [payload.new, ...prev]);
                        else if (payload.eventType === 'DELETE') setAmenities(prev => prev.filter(a => a.id !== payload.old.id));
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'reservations' }, (payload) => {
                        if (payload.eventType === 'INSERT') setReservations(prev => [payload.new, ...prev]);
                        else if (payload.eventType === 'UPDATE') setReservations(prev => prev.map(r => r.id === payload.new.id ? payload.new : r));
                        else if (payload.eventType === 'DELETE') setReservations(prev => prev.filter(r => r.id !== payload.old.id));
                    })
                    .subscribe();
                return () => supabase.removeChannel(channel);
            }, [currentUser]);

            const [toast, setToast] = useState(null);
            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            const handleLogout = () => {
                clearSession();
                setCurrentUser(null);
            };

            // Filtreleme
            const getFilteredFeedbacks = () => {
                let filtered = feedbacks.filter(fb => {
                    if (filters.department !== 'all' && fb.department !== filters.department) return false;
                    if (filters.type !== 'all' && fb.type !== filters.type) return false;
                    if (filters.status !== 'all' && fb.status !== filters.status) return false;
                    if (filters.dateFrom && fb.date < filters.dateFrom) return false;
                    if (filters.dateTo && fb.date > filters.dateTo) return false;
                    if (filters.search) {
                        const s = filters.search.toLowerCase();
                        return fb.title.toLowerCase().includes(s) || fb.description.toLowerCase().includes(s) ||
                               fb.guest_name.toLowerCase().includes(s) || fb.room_number.toLowerCase().includes(s);
                    }
                    return true;
                });

                filtered.sort((a, b) => {
                    let aVal, bVal;
                    if (sortBy === 'date') { aVal = new Date(a.date); bVal = new Date(b.date); }
                    else if (sortBy === 'room') { aVal = parseInt(a.room_number) || 0; bVal = parseInt(b.room_number) || 0; }
                    else if (sortBy === 'status') { aVal = a.status; bVal = b.status; }
                    return sortOrder === 'asc' ? (aVal > bVal ? 1 : -1) : (aVal < bVal ? 1 : -1);
                });

                return filtered;
            };

            // İstatistikler
            const stats = useMemo(() => {
                const filtered = getFilteredFeedbacks();
                const total = filtered.length;
                const complaints = filtered.filter(f => f.type === 'complaint').length;
                const positive = filtered.filter(f => f.type === 'positive').length;
                const open = filtered.filter(f => f.status === 'open').length;
                const overdue = filtered.filter(f => isOverdue(f)).length;

                const departmentStats = DEPARTMENTS.map(dept => ({
                    name: dept,
                    complaints: filtered.filter(f => f.department === dept && f.type === 'complaint').length,
                    positive: filtered.filter(f => f.department === dept && f.type === 'positive').length
                }));

                const trendData = [];
                for (let i = 6; i >= 0; i--) {
                    const date = new Date();
                    date.setDate(date.getDate() - i);
                    const dateStr = date.toISOString().split('T')[0];
                    trendData.push({
                        date: date.toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' }),
                        count: feedbacks.filter(f => f.date === dateStr).length
                    });
                }

                const closedComplaints = feedbacks.filter(f => f.type === 'complaint' && f.status === 'closed');
                const avgResponseTime = closedComplaints.length > 0
                    ? Math.round(closedComplaints.reduce((sum, f) => {
                        const days = Math.ceil((new Date(f.created_at) - new Date(f.date)) / (1000 * 60 * 60 * 24));
                        return sum + Math.abs(days);
                    }, 0) / closedComplaints.length)
                    : 0;

                return { total, complaints, positive, open, overdue, departmentStats, trendData, avgResponseTime };
            }, [feedbacks, filters, sortBy, sortOrder]);

            const isAdmin = currentUser?.role === 'admin';

            // ==================== LOGIN ====================
            if (!currentUser) {
                return <LoginForm onLogin={setCurrentUser} />;
            }

            // ==================== MAIN UI ====================
            return (
                <div className="app">
                    {toast && (
                        <div className={`toast toast-${toast.type}`}>
                            {toast.type === 'success' ? '✅' : '❌'} {toast.msg}
                        </div>
                    )}
                    <Sidebar 
                        currentView={currentView} 
                        setCurrentView={setCurrentView}
                        currentUser={currentUser}
                        isAdmin={isAdmin}
                        onLogout={handleLogout}
                    />

                    <main className="main-content">
                        {currentView === 'dashboard' && <DashboardView stats={stats} feedbacks={feedbacks.slice(0, 5)} />}
                        
                        {currentView === 'feedbacks' && (
                            <FeedbacksView
                                feedbacks={getFilteredFeedbacks()}
                                filters={filters}
                                setFilters={setFilters}
                                sortBy={sortBy}
                                setSortBy={setSortBy}
                                sortOrder={sortOrder}
                                setSortOrder={setSortOrder}
                                isAdmin={isAdmin}
                                currentUser={currentUser}
                                onAdd={() => { setModalType('feedback'); setEditingItem(null); setShowModal(true); }}
                                onEdit={(item) => { setEditingItem(item); setModalType('feedback'); setShowModal(true); }}
                                onDelete={async (id) => {
                                    if (!confirm('Silmek istediğinizden emin misiniz?')) return;
                                    await supabase.from('feedbacks').delete().eq('id', id);
                                    showToast('Kayıt silindi');
                                }}
                                onBulkDelete={async (ids, onDone) => {
                                    if (!confirm(`${ids.length} kayıt silinecek. Emin misiniz?`)) return;
                                    await supabase.from('feedbacks').delete().in('id', ids);
                                    showToast(`${ids.length} kayıt silindi`);
                                    onDone();
                                }}
                                onBulkClose={async (ids, onDone) => {
                                    if (!confirm(`${ids.length} şikayet kapatılacak. Emin misiniz?`)) return;
                                    await supabase.from('feedbacks').update({ status: 'closed' }).in('id', ids);
                                    showToast(`${ids.length} şikayet kapatıldı`);
                                    onDone();
                                }}
                                stats={stats}
                            />
                        )}

                        {currentView === 'amenities' && (
                            <AmenitiesView
                                amenities={amenities}
                                isAdmin={isAdmin}
                                onAdd={() => { setModalType('amenity'); setEditingItem(null); setShowModal(true); }}
                                onDelete={async (id) => {
                                    if (!confirm('Silmek istediğinizden emin misiniz?')) return;
                                    await supabase.from('amenities').delete().eq('id', id);
                                    await loadData();
                                }}
                            />
                        )}

                        {currentView === 'alacarte' && (
                            <AlaCarteView
                                restaurants={restaurants}
                                reservations={reservations}
                                isAdmin={isAdmin}
                                onAddRestaurant={() => { setModalType('restaurant'); setEditingItem(null); setShowModal(true); }}
                                onEditRestaurant={(item) => { setEditingItem(item); setModalType('restaurant'); setShowModal(true); }}
                                onDeleteRestaurant={async (id) => {
                                    if (!confirm('Restoranı silmek istediğinizden emin misiniz?')) return;
                                    await supabase.from('restaurants').delete().eq('id', id);
                                    await loadData();
                                }}
                                onAddReservation={() => { setModalType('reservation'); setEditingItem(null); setShowModal(true); }}
                                onEditReservation={(item) => { setEditingItem(item); setModalType('reservation'); setShowModal(true); }}
                                onDeleteReservation={async (id) => {
                                    if (!confirm('Rezervasyonu silmek istediğinizden emin misiniz?')) return;
                                    await supabase.from('reservations').delete().eq('id', id);
                                    await loadData();
                                }}
                            />
                        )}

                        {currentView === 'analytics' && <AnalyticsView stats={stats} />}
                        
                        {currentView === 'notifications' && isAdmin && (
                            <NotificationsView />
                        )}

                        {currentView === 'users' && isAdmin && (
                            <UsersView
                                users={users}
                                currentUser={currentUser}
                                onAdd={() => { setModalType('user'); setEditingItem(null); setShowModal(true); }}
                                onEdit={(item) => { setEditingItem(item); setModalType('user'); setShowModal(true); }}
                                onDelete={async (id) => {
                                    if (!confirm('Silmek istediğinizden emin misiniz?')) return;
                                    await supabase.from('users').delete().eq('id', id);
                                    await loadData();
                                }}
                            />
                        )}
                    </main>

                    {showModal && (
                        <Modal
                            type={modalType}
                            item={editingItem}
                            currentUser={currentUser}
                            onClose={() => { setShowModal(false); setEditingItem(null); }}
                            onSave={async (data) => {
                                try {
                                    if (modalType === 'feedback') {
                                        // ÇOK ÖNEMLİ: Şikayet kapatılırken çözüm zorunlu
                                        if (data.type === 'complaint' && data.status === 'closed') {
                                            if (!data.resolution || data.resolution.trim() === '') {
                                                alert('⚠️ Şikayet kapatılırken çözüm açıklaması zorunludur!');
                                                return;
                                            }
                                        }

                                        if (editingItem) {
                                            await supabase.from('feedbacks').update(data).eq('id', editingItem.id);
                                            // Durum değişikliği logu
                                            if (editingItem.status !== data.status) {
                                                await supabase.from('feedback_logs').insert([{
                                                    feedback_id: editingItem.id,
                                                    user_name: currentUser.name,
                                                    action: 'status_change',
                                                    old_value: editingItem.status === 'open' ? 'Açık' : 'Kapalı',
                                                    new_value: data.status === 'open' ? 'Açık' : 'Kapalı'
                                                }]);
                                            } else {
                                                await supabase.from('feedback_logs').insert([{
                                                    feedback_id: editingItem.id,
                                                    user_name: currentUser.name,
                                                    action: 'edited',
                                                    note: 'Kayıt güncellendi'
                                                }]);
                                            }
                                        } else {
                                            const { data: newFb } = await supabase.from('feedbacks').insert([{ ...data, created_by: currentUser.username }]).select().single();
                                            // Oluşturulma logu
                                            if (newFb) {
                                                await supabase.from('feedback_logs').insert([{
                                                    feedback_id: newFb.id,
                                                    user_name: currentUser.name,
                                                    action: 'created',
                                                    note: `${data.type === 'complaint' ? 'Şikayet' : 'Olumlu geri bildirim'} oluşturuldu`
                                                }]);
                                            }
                                        }
                                    } else if (modalType === 'amenity') {
                                        await supabase.from('amenities').insert([{ ...data, created_by: currentUser.username }]);
                                    } else if (modalType === 'restaurant') {
                                        if (editingItem) {
                                            await supabase.from('restaurants').update(data).eq('id', editingItem.id);
                                        } else {
                                            await supabase.from('restaurants').insert([{ ...data, created_by: currentUser.username }]);
                                        }
                                    } else if (modalType === 'reservation') {
                                        if (editingItem) {
                                            await supabase.from('reservations').update(data).eq('id', editingItem.id);
                                        } else {
                                            await supabase.from('reservations').insert([{ ...data, created_by: currentUser.username }]);
                                        }
                                    } else {
                                        const updateData = { ...data };
                                        if (!updateData.password) delete updateData.password;
                                        
                                        if (editingItem) {
                                            await supabase.from('users').update(updateData).eq('id', editingItem.id);
                                        } else {
                                            await supabase.from('users').insert([data]);
                                        }
                                    }
                                    await loadData();
                                    setShowModal(false);
                                    setEditingItem(null);
                                } catch (error) {
                                    alert('Hata: ' + error.message);
                                }
                            }}
                        />
                    )}
                </div>
            );
        }

        // ==================== COMPONENTS ====================
        
        function LoginForm({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                try {
                    // Güvenli login: pgcrypto tabanlı server-side fonksiyon
                    const { data, error } = await supabase
                        .rpc('login', { p_username: username, p_password: password });

                    if (error || !data || data.length === 0) {
                        setError('Kullanıcı adı veya şifre hatalı!');
                    } else {
                        onLogin(data[0]);
                    }
                } catch (err) {
                    setError('Giriş hatası!');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="login-page">
                    <div className="login-bg"></div>
                    <div className="login-container">
                        <div className="login-card">
                            <div className="login-logo">
                                <div className="logo-icon">🏨</div>
                                <h1>Premium Hotel</h1>
                                <p>Management System</p>
                            </div>
                            
                            <form onSubmit={handleSubmit} className="login-form">
                                {error && <div className="alert-error">{error}</div>}
                                
                                <div className="form-group">
                                    <label>Kullanıcı Adı</label>
                                    <input
                                        type="text"
                                        value={username}
                                        onChange={(e) => setUsername(e.target.value)}
                                        placeholder="Kullanıcı adınızı girin"
                                        disabled={loading}
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Şifre</label>
                                    <input
                                        type="password"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        placeholder="Şifrenizi girin"
                                        disabled={loading}
                                        required
                                    />
                                </div>

                                <button type="submit" className="btn-login" disabled={loading}>
                                    {loading ? <span className="spinner"></span> : 'Giriş Yap'}
                                </button>
                            </form>

                            <div className="login-footer">
                                <p className="demo-info">© Premium Hotel Management System</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function Sidebar({ currentView, setCurrentView, currentUser, isAdmin, onLogout }) {
            return (
                <aside className="sidebar">

        // ==================== ACTIVITY LOG COMPONENT ====================
        function ActivityLog({ feedbackId, currentUser }) {
            const [logs, setLogs] = React.useState([]);
            const [open, setOpen] = React.useState(false);
            const [note, setNote] = React.useState('');
            const [saving, setSaving] = React.useState(false);

            const loadLogs = async () => {
                const { data } = await supabase
                    .from('feedback_logs')
                    .select('*')
                    .eq('feedback_id', feedbackId)
                    .order('created_at', { ascending: false });
                setLogs(data || []);
            };

            React.useEffect(() => {
                if (open) loadLogs();
            }, [open, feedbackId]);

            const addNote = async () => {
                if (!note.trim()) return;
                setSaving(true);
                await supabase.from('feedback_logs').insert([{
                    feedback_id: feedbackId,
                    user_name: currentUser.name,
                    action: 'comment',
                    note: note.trim()
                }]);
                setNote('');
                await loadLogs();
                setSaving(false);
            };

            const actionLabel = (log) => {
                if (log.action === 'comment') return { icon: '💬', label: 'Yorum', color: '#3b82f6' };
                if (log.action === 'status_change') return { icon: '🔄', label: `${log.old_value} → ${log.new_value}`, color: '#f59e0b' };
                if (log.action === 'created') return { icon: '✨', label: 'Oluşturuldu', color: '#22c55e' };
                if (log.action === 'edited') return { icon: '✏️', label: 'Düzenlendi', color: '#8b5cf6' };
                return { icon: '📌', label: log.action, color: '#6b7280' };
            };

            return (
                <div className="activity-section">
                    <button className="activity-toggle" onClick={() => setOpen(!open)}>
                        {open ? '▲' : '▼'} Aktivite Geçmişi {logs.length > 0 && !open ? `(${logs.length})` : ''}
                    </button>

                    {open && (
                        <div className="activity-panel">
                            <div className="activity-add">
                                <input
                                    type="text"
                                    value={note}
                                    onChange={e => setNote(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && addNote()}
                                    placeholder="Not ekle... (Enter ile kaydet)"
                                    className="activity-input"
                                    disabled={saving}
                                />
                                <button className="activity-save-btn" onClick={addNote} disabled={saving || !note.trim()}>
                                    {saving ? '...' : 'Ekle'}
                                </button>
                            </div>

                            {logs.length === 0 ? (
                                <p className="activity-empty">Henüz aktivite yok</p>
                            ) : (
                                <div className="activity-list">
                                    {logs.map(log => {
                                        const { icon, label, color } = actionLabel(log);
                                        return (
                                            <div key={log.id} className="activity-item">
                                                <div className="activity-icon" style={{background: color + '20', color}}>
                                                    {icon}
                                                </div>
                                                <div className="activity-content">
                                                    <div className="activity-header-row">
                                                        <span className="activity-action" style={{color}}>{label}</span>
                                                        <span className="activity-user">👤 {log.user_name}</span>
                                                        <span className="activity-time">{formatDateTime(log.created_at)}</span>
                                                    </div>
                                                    {log.note && <p className="activity-note">{log.note}</p>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

                                        {stats.departmentStats.filter(d => d.complaints + d.positive > 0).map(dept => {
                                            const total = dept.complaints + dept.positive;
                                            const successRate = Math.round((dept.positive / total) * 100);
                                            return (
                                                <tr key={dept.name}>
                                                    <td><strong>{dept.name}</strong></td>
                                                    <td className="text-danger">{dept.complaints}</td>
                                                    <td className="text-success">{dept.positive}</td>
                                                    <td>
                                                        <div className="progress-bar">
                                                            <div className="progress-fill success" style={{width: `${successRate}%`}}></div>
                                                        </div>
                                                        <span className="progress-label">{successRate}%</span>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== NOTIFICATIONS VIEW ====================
        function NotificationsView() {
            const [contacts, setContacts] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [saving, setSaving] = React.useState(null);
            const [toast, setToastLocal] = React.useState(null);

            const showLocal = (msg, type='success') => {
                setToastLocal({ msg, type });
                setTimeout(() => setToastLocal(null), 3000);
            };

            const loadContacts = async () => {
                setLoading(true);
                const { data } = await supabase
                    .from('department_contacts')
                    .select('*')
                    .order('id');
                setContacts(data || []);
                setLoading(false);
            };

            React.useEffect(() => { loadContacts(); }, []);

            const updateContact = async (id, field, value) => {
                setContacts(prev => prev.map(c => c.id === id ? { ...c, [field]: value } : c));
            };

            const saveContact = async (contact) => {
                setSaving(contact.id);
                const { error } = await supabase
                    .from('department_contacts')
                    .update({ email: contact.email, name: contact.name })
                    .eq('id', contact.id);
                setSaving(null);
                if (error) showLocal('Kayıt hatası: ' + error.message, 'error');
                else showLocal(contact.department + ' güncellendi ✓');
            };

            const testEmail = async (contact) => {
                if (!contact.email) { showLocal('Önce e-posta adresini girin', 'error'); return; }
                setSaving('test-' + contact.id);
                try {
                    const res = await fetch('https://api.resend.com/emails', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer %%RESEND_API_KEY%%'
                        },
                        body: JSON.stringify({
                            from: 'Hotel System <onboarding@resend.dev>',
                            to: contact.email,
                            subject: '✅ Test - Hotel Bildirim Sistemi',
                            html: '<p>Bu bir test e-postasıdır. Bildirim sistemi çalışıyor!</p><p><strong>Departman:</strong> ' + contact.department + '</p>'
                        })
                    });
                    if (res.ok) showLocal('Test maili gönderildi → ' + contact.email);
                    else showLocal('Mail gönderilemedi', 'error');
                } catch(e) {
                    showLocal('Bağlantı hatası', 'error');
                }
                setSaving(null);
            };

            return (
                <div className="view-container">
                    {toast && (
                        <div className={`toast toast-${toast.type}`} style={{position:'fixed',bottom:32,right:32,zIndex:9999}}>
                            {toast.type === 'success' ? '✅' : '❌'} {toast.msg}
                        </div>
                    )}

                    <div className="view-header">
                        <div>
                            <h1>📧 Bildirim Ayarları</h1>
                            <p>Gecikmiş şikayet bildirimlerinin gideceği departman e-postaları</p>
                        </div>
                    </div>

                    <div className="notif-info-box">
                        <span className="notif-info-icon">ℹ️</span>
                        <div>
                            <strong>Nasıl çalışır?</strong> Her gün sabah 09:00'da sistem gecikmiş şikayetleri tarar ve
                            ilgili departman sorumlularına otomatik e-posta gönderir.
                            E-posta adreslerini aşağıdan güncelleyebilirsiniz.
                        </div>
                    </div>

                    {loading ? (
                        <div style={{textAlign:'center',padding:'40px',color:'var(--gray-700)'}}>Yükleniyor...</div>
                    ) : (
                        <div className="notif-grid">
                            {contacts.map(contact => (
                                <div key={contact.id} className="notif-card">
                                    <div className="notif-dept-header">
                                        <span className="notif-dept-icon">
                                            {contact.department === 'Yemek ve İçecek' ? '🍽️' :
                                             contact.department === 'Temizlik' ? '🧹' :
                                             contact.department === 'Ön Büro' ? '🏨' :
                                             contact.department === 'Misafir İlişkileri' ? '🤝' :
                                             contact.department === 'Güvenlik ve Cankurtaran' ? '🛡️' :
                                             contact.department === 'Teknik Servis' ? '🔧' :
                                             contact.department === 'Animasyon ve Eğlence' ? '🎭' : '📋'}
                                        </span>
                                        <h3>{contact.department}</h3>
                                    </div>

                                    <div className="notif-form">
                                        <div className="form-group">
                                            <label>Sorumlu Adı</label>
                                            <input
                                                type="text"
                                                value={contact.name || ''}
                                                onChange={e => updateContact(contact.id, 'name', e.target.value)}
                                                placeholder="Örn: Ahmet Yılmaz"
                                            />
                                        </div>
                                        <div className="form-group">
                                            <label>E-posta Adresi</label>
                                            <input
                                                type="email"
                                                value={contact.email || ''}
                                                onChange={e => updateContact(contact.id, 'email', e.target.value)}
                                                placeholder="sorumlu@otel.com"
                                            />
                                        </div>
                                    </div>

                                    <div className="notif-actions">
                                        <button
                                            className="btn btn-primary"
                                            onClick={() => saveContact(contact)}
                                            disabled={saving === contact.id}
                                        >
                                            {saving === contact.id ? '...' : '💾 Kaydet'}
                                        </button>
                                        <button
                                            className="btn btn-secondary"
                                            onClick={() => testEmail(contact)}
                                            disabled={saving === 'test-' + contact.id}
                                        >
                                            {saving === 'test-' + contact.id ? '...' : '📨 Test Maili'}
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

                                            <option value="user">Personel</option>
                                            <option value="admin">Yönetici</option>
                                        </select>
                                    </div>
                                </>
                            )}

            color: var(--gray-700);

            font-size: 14px;
            color: var(--gray-700);

            color: var(--gray-700);

            padding: 20px;
            border-radius: 14px;

            display: flex;
            flex-direction: column;

            align-items: center;
            gap: 10px;

            gap: 6px;

        .amenity-icon-small {

            line-height: 1;

        .amenity-type-label {

        .amenity-room-badge {

            font-weight: 700;

            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 6px;

        .amenity-reason-text {
            font-size: 13px;
            color: var(--gray-900);

            line-height: 1.5;

        .amenity-notes-text {
            font-size: 13px;
            color: var(--gray-700);
            font-style: italic;
            margin: 0;
            line-height: 1.5;

            margin-top: 2px;

            display: grid;
            gap: 24px;
        }

        .analytics-card {
            background: white;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .analytics-card h3 {
            font-size: 20px;
            color: var(--primary);
            margin-bottom: 24px;
        }

        .table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }

        .data-table th {
            font-size: 13px;
            font-weight: 700;
            color: var(--gray-700);
            text-transform: uppercase;
        }

        .data-table td {
            font-size: 14px;
            color: var(--gray-700);
        }

        .data-table tr:hover {
            background: var(--gray-50);
        }

        .text-danger { color: var(--danger); }
        .text-success { color: var(--success); }

        .progress-bar {
            height: 8px;
            background: var(--gray-200);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .progress-fill {
            height: 100%;
            transition: width 0.5s ease;
        }

        .progress-fill.success {
            background: var(--success);
        }

        .progress-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-700);
        }

            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;

            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);

            gap: 16px;
            align-items: center;
            transition: all 0.3s;

            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);

            color: var(--gray-700);
            margin-bottom: 8px;

            display: flex;
            gap: 8px;

            padding: 20px;
            animation: fadeIn 0.3s ease-out;
